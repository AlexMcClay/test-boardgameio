services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
