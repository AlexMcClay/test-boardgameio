map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

server {
    listen 8080;
    server_name tableforge.dev www.tableforge.dev;
    server_tokens off;

    # Drop raw request-line traversal attempts and sensitive file probes.
    if ($request ~* "(?:\s/.*\.\./|/proc/self/environ|/etc/passwd)") {
        return 444;
    }

    # Drop common scanner/probe payloads before request routing.
    if ($request_uri ~* "(?:/cgi-bin/|/bin/sh|\.\./|%2e%2e|\.\.\\%2f|%2f\.\.)") {
        return 444;
    }

    # Static frontend only need safe read methods.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    # ACME challenge endpoint for Let's Encrypt webroot validation.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name tableforge.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tableforge.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tableforge.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Drop raw request-line traversal attempts and sensitive file probes.
    if ($request ~* "(?:\s/.*\.\./|/proc/self/environ|/etc/passwd)") {
        return 444;
    }

    # Drop common scanner/probe payloads before SPA fallback.
    if ($request_uri ~* "(?:/cgi-bin/|/bin/sh|\.\./|%2e%2e|\.\.\\%2f|%2f\.\.)") {
        return 444;
    }

    # Static frontend only need safe read methods.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 8080;
    server_name api.tableforge.dev;
    server_tokens off;

    # Drop raw request-line traversal attempts and sensitive file probes.
    if ($request ~* "(?:\s/.*\.\./|/proc/self/environ|/etc/passwd)") {
        return 444;
    }

    # Drop common scanner/probe payloads before request routing.
    if ($request_uri ~* "(?:/cgi-bin/|/bin/sh|\.\./|%2e%2e|\.\.\\%2f|%2f\.\.)") {
        return 444;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name api.tableforge.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/tableforge.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tableforge.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Drop raw request-line traversal attempts and sensitive file probes.
    if ($request ~* "(?:\s/.*\.\./|/proc/self/environ|/etc/passwd)") {
        return 444;
    }

    # Drop common scanner/probe payloads before upstream proxying.
    if ($request_uri ~* "(?:/cgi-bin/|/bin/sh|\.\./|%2e%2e|\.\.\\%2f|%2f\.\.)") {
        return 444;
    }

    # Backend API should only accept typical API/WebSocket methods.
    if ($request_method !~ ^(GET|POST|OPTIONS)$) {
        return 405;
    }

    client_max_body_size 1m;
    client_body_timeout 10s;
    send_timeout 30s;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        limit_req zone=api_per_ip burst=40 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}


